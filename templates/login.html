{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-panel">
        <div class="auth-header">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to your StatSnap account</p>
        </div>
        
        {% if error %}
        <div class="auth-error-box">
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="post" class="auth-form">
            <div class="auth-input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="input" placeholder="name@example.com" required>
            </div>
            <div class="auth-input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input" placeholder="••••••••" required>
            </div>
            <div style="margin-top: 1rem;">
                <button type="submit" class="btn btn-primary btn-full" style="height: 44px;">Log In</button>
            </div>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="/signup">Sign up for free</a>
        </div>
    </div>
</div>
{% endblock %}
