{% extends "base.html" %}

{% block title %}Edit · {{ student.name }}{% endblock %}

{% block content %}
<div class="auth-container" style="min-height: calc(100vh - 100px);">
    <div class="auth-panel" style="max-width: 550px; border-left: 4px solid var(--accent); position: relative;">
        <!-- Compact Header -->
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
            <div style="text-align: left;">
                <h1 class="auth-title" style="font-size: 1.4rem;">Edit Details</h1>
                <p class="auth-subtitle" style="margin-bottom: 0;">Updating profiles for <strong>{{ student.name }}</strong></p>
            </div>
            <a href="{{ url_for('student_dashboard', student_id=student.id) }}" class="modal-close" style="text-decoration: none;">&times;</a>
        </div>

        {% if error %}
        <div class="auth-error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="{{ url_for('edit_student', student_id=student.id) }}" class="auth-form">
            <div class="auth-input-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ student.name }}" required class="input" placeholder="e.g. John Doe">
            </div>
            
            <div class="input-group-row">
                <div class="auth-input-group">
                    <label>Codeforces</label>
                    <input type="text" name="cf_handle" value="{{ student.cf_handle or '' }}" class="input" placeholder="handle">
                </div>
                <div class="auth-input-group">
                    <label>CodeChef</label>
                    <input type="text" name="cc_handle" value="{{ student.cc_handle or '' }}" class="input" placeholder="handle">
                </div>
            </div>

            <div class="auth-input-group">
                <label>LeetCode</label>
                <input type="text" name="lc_handle" value="{{ student.lc_handle or '' }}" class="input" placeholder="username">
            </div>

            <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2; height: 44px;">Save Updates</button>
                <a href="{{ url_for('student_dashboard', student_id=student.id) }}" class="btn btn-ghost" style="flex: 1; height: 44px; display: flex; align-items: center; justify-content: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
