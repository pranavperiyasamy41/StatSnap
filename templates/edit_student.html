{% extends "base.html" %}

{% block title %}Edit · {{ student.name }}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-panel">
        <div class="auth-header">
            <h1 class="auth-title">Edit Student</h1>
            <p class="auth-subtitle">Updating profile configuration for <strong>{{ student.name }}</strong></p>
        </div>

        {% if error %}
        <div class="auth-error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="{{ url_for('edit_student', student_id=student.id) }}" class="auth-form">
            <div class="auth-input-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ student.name }}" required class="input" placeholder="e.g. John Doe">
            </div>
            
            <div class="input-group-row">
                <div class="auth-input-group">
                    <label>Codeforces</label>
                    <input type="text" name="cf_handle" value="{{ student.cf_handle or '' }}" class="input" placeholder="handle">
                </div>
                <div class="auth-input-group">
                    <label>CodeChef</label>
                    <input type="text" name="cc_handle" value="{{ student.cc_handle or '' }}" class="input" placeholder="handle">
                </div>
            </div>

            <div class="auth-input-group">
                <label>LeetCode</label>
                <input type="text" name="lc_handle" value="{{ student.lc_handle or '' }}" class="input" placeholder="username">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Save Changes</button>
                <a href="{{ url_for('student_dashboard', student_id=student.id) }}" class="btn btn-ghost" style="flex: 1;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
