{% extends "base.html" %}

{% block title %}Edit Student · {{ student.name }} | StatSnap{% endblock %}

{% block content %}
<section class="panel">
  <header class="panel-header-row">
    <div class="header-with-back">
      <a href="{{ url_for('student_dashboard', student_id=student.id) }}" class="btn btn-ghost btn-icon" title="Back to Dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </a>
      <div>
        <h1 class="panel-title">Edit Student Details</h1>
        <p class="panel-subtitle">Update names and platform handles for {{ student.name }}.</p>
      </div>
    </div>
  </header>
</section>

<section class="panel">
  <form method="post" action="{{ url_for('edit_student', student_id=student.id) }}" class="form-vertical" style="max-width: 500px; margin: 0 auto;">
    <div class="form-group">
      <label class="form-label">
        <span>Full Name</span>
        <input type="text" name="name" value="{{ student.name }}" required class="input" />
      </label>
    </div>
    
    <div class="form-group">
      <label class="form-label">
        <span>Codeforces Handle</span>
        <input type="text" name="cf_handle" value="{{ student.cf_handle or '' }}" required class="input" />
      </label>
    </div>

    <div class="form-group">
      <label class="form-label">
        <span>CodeChef Handle</span>
        <input type="text" name="cc_handle" value="{{ student.cc_handle or '' }}" required class="input" />
      </label>
    </div>

    <div class="form-group">
      <label class="form-label">
        <span>LeetCode Handle</span>
        <input type="text" name="lc_handle" value="{{ student.lc_handle or '' }}" required class="input" />
      </label>
    </div>

    <div class="form-actions" style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('student_dashboard', student_id=student.id) }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
