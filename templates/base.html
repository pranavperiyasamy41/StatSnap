<!DOCTYPE html>
<html>
<head>
    <title>StatSnap</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="/" style="font-weight: bold; font-size: 1.2rem; text-decoration: none; color: #333;">StatSnap</a>
            <div class="nav-links">
                {% if request.state.user %}
                    <span style="margin-right: 15px;">Hello, {{ request.state.user.email }}</span>
                    <a href="/" style="margin-right: 10px;">Dashboard</a>
                    <a href="/logout" style="color: red;">Logout</a>
                {% else %}
                    <a href="/login" style="margin-right: 10px;">Login</a>
                    <a href="/signup">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
