{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">Join StatSnap to start tracking competitive programming progress for your students.</p>
        
        {% if error %}
        <div class="auth-error">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" cy="12" x2="12" y2="16"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/signup" method="post" class="auth-form">
            <div class="auth-input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="auth-input" placeholder="name@example.com" required>
            </div>
            <div class="auth-input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="auth-input" placeholder="At least 6 characters" required minlength="6">
            </div>
            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary btn-full" style="height: 46px; font-size: 0.95rem;">Get Started</button>
            </div>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in here</a>
        </div>
    </div>
</div>
{% endblock %}
