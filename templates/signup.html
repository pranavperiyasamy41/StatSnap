{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-panel">
        <div class="auth-header">
            <h1 class="auth-title">Create account</h1>
            <p class="auth-subtitle">Join StatSnap to track student performance</p>
        </div>
        
        {% if error %}
        <div class="auth-error-box">
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/signup" method="post" class="auth-form">
            <div class="auth-input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="input" placeholder="name@example.com" required>
            </div>
            <div class="auth-input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input" placeholder="At least 6 characters" required minlength="6">
            </div>
            <div style="margin-top: 1rem;">
                <button type="submit" class="btn btn-primary btn-full" style="height: 44px;">Create Account</button>
            </div>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="/login">Log in here</a>
        </div>
    </div>
</div>
{% endblock %}
